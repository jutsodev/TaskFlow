name: Build IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

    - name: Get Xcode version
      run: xcodebuild -version

    - name: Build Archive (unsigned)
      run: |
        xcodebuild \
          -project TaskFlow.xcodeproj \
          -scheme TaskFlow \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath build \
          -archivePath build/TaskFlow.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          archive

    - name: Create unsigned IPA
      run: |
        mkdir -p build/Payload
        cp -R "build/TaskFlow.xcarchive/Products/Applications/TaskFlow.app" build/Payload/
        cd build && zip -r TaskFlow.ipa Payload
        rm -rf build/Payload

    - name: Upload IPA to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TaskFlow.ipa
        path: build/TaskFlow.ipa
        retention-days: 30

    - name: Get IPA info
      run: |
        ls -lh build/TaskFlow.ipa
        echo "Build completed successfully!"
        echo "IPA file size: $(du -h build/TaskFlow.ipa | cut -f1)"

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/TaskFlow.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
