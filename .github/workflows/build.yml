name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project TaskFlow.xcodeproj \
            -scheme TaskFlow \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/TaskFlow.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SKIP_INSTALL=NO

      - name: Export IPA
        run: |
          mkdir -p build/Payload
          cp -R build/TaskFlow.xcarchive/Products/Applications/TaskFlow.app build/Payload/
          cd build && zip -r TaskFlow.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow.ipa
          path: build/TaskFlow.ipa
          retention-days: 30
