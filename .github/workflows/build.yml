name: Build TaskFlow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -project TaskFlow.xcodeproj -scheme TaskFlow

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project TaskFlow.xcodeproj \
            -scheme TaskFlow \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Build for Release (Archive)
        run: |
          xcodebuild archive \
            -project TaskFlow.xcodeproj \
            -scheme TaskFlow \
            -archivePath $RUNNER_TEMP/TaskFlow.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            | xcpretty || true

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Archive
          path: ${{ runner.temp }}/TaskFlow.xcarchive
          retention-days: 7

      - name: Export IPA (may require signing assets)
        run: |
          cat > $RUNNER_TEMP/exportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          PLIST

          mkdir -p $RUNNER_TEMP/TaskFlowExport

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/TaskFlow.xcarchive \
            -exportPath $RUNNER_TEMP/TaskFlowExport \
            -exportOptionsPlist $RUNNER_TEMP/exportOptions.plist \
            | xcpretty || true

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-IPA
          path: ${{ runner.temp }}/TaskFlowExport/*.ipa
          retention-days: 7
