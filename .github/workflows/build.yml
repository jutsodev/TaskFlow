name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project TaskFlow.xcodeproj \
            -scheme TaskFlow \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/TaskFlow.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Export IPA
        run: |
          mkdir -p build/ipa-output
          cp -r build/TaskFlow.xcarchive/Products/Applications/TaskFlow.app build/ipa-output/
          cd build/ipa-output
          mkdir Payload
          mv TaskFlow.app Payload/
          zip -r TaskFlow.ipa Payload
          cd ../..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow.ipa
          path: build/ipa-output/TaskFlow.ipa
